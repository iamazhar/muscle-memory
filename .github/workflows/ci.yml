name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --frozen --extra dev
      - run: uv run mypy src/muscle_memory/

  test:
    # macOS CI runners lack --enable-loadable-sqlite-extensions,
    # so sqlite-vec tests fail there. Tests run on macOS locally.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --frozen --extra dev
      - run: uv run pytest tests/ --ignore=tests/test_behavioral.py -q

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --frozen --extra dev
      - run: |
          VERSION="$(uv run python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(pyproject['project']['version'])
          PY
          )"
          uv run python scripts/release_preflight.py "${VERSION}"
      - name: Run release benchmark gate
        run: uv run mm eval run --json > benchmark-run.json
      - name: Assert benchmark thresholds
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("benchmark-run.json").read_text(encoding="utf-8"))
          assert data["thresholds_passed"] is True, data["failed_thresholds"]
          PY
      - run: uv build
      - run: uvx --from twine twine check dist/*
      - run: |
          VERSION="$(uv run python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(pyproject['project']['version'])
          PY
          )"
          uv run python scripts/generate_release_checksums.py "${VERSION}"
      - name: Verify wheel and sdist install smoke tests
        run: |
          VERSION="$(uv run python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(pyproject['project']['version'])
          PY
          )"
          uv run python scripts/check_release_artifacts.py "${VERSION}"
