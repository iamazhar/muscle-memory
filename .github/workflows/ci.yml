name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra dev
      - run: uv run mypy src/muscle_memory/

  test:
    # macOS CI runners lack --enable-loadable-sqlite-extensions,
    # so sqlite-vec tests fail there. Tests run on macOS locally.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - run: uv run pytest tests/ --ignore=tests/test_behavioral.py -q

  binary-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --extra dev --extra openai --extra voyage
      - name: Build Linux release binary
        run: |
          VERSION="$(uv run python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(pyproject['project']['version'])
          PY
          )"
          uv run python scripts/build_release_binaries.py "${VERSION}" dist --target linux-x86_64
      - name: Smoke-test Linux release binary
        run: |
          VERSION="$(uv run python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(pyproject['project']['version'])
          PY
          )"
          uv run python scripts/check_release_binaries.py "${VERSION}" dist --target linux-x86_64
      - name: Smoke-test installer path
        run: uv run pytest tests/test_install_script.py -q
