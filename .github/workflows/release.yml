name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (for example: 0.7.3)"
        required: true
        type: string
      publish_to_pypi:
        description: "Publish the built package to PyPI after the GitHub release"
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Validate version, changelog, and tag state
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          version = os.environ["VERSION"].strip()
          if not re.fullmatch(r"\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?", version):
              raise SystemExit(
                  f"VERSION must look like 1.2.3 (optionally with a suffix), got: {version!r}"
              )

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project_version = pyproject["project"]["version"]

          init_text = Path("src/muscle_memory/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'__version__ = "([^"]+)"', init_text)
          if not match:
              raise SystemExit("Could not find __version__ in src/muscle_memory/__init__.py")
          init_version = match.group(1)

          if project_version != version:
              raise SystemExit(
                  f"pyproject.toml version {project_version!r} does not match requested version {version!r}"
              )
          if init_version != version:
              raise SystemExit(
                  f"src/muscle_memory/__init__.py version {init_version!r} does not match requested version {version!r}"
              )

          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          if f"## [{version}]" not in changelog:
              raise SystemExit(f"CHANGELOG.md is missing a ## [{version}] section")
          PY

          if git rev-parse "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            TAG_SHA="$(git rev-list -n 1 "refs/tags/v${VERSION}")"
            HEAD_SHA="$(git rev-parse HEAD)"
            if [ "${TAG_SHA}" != "${HEAD_SHA}" ]; then
              echo "Tag v${VERSION} already exists on ${TAG_SHA}, not ${HEAD_SHA}."
              exit 1
            fi
          fi

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Verify release checklist inputs
        run: |
          test -f docs/release.md
          uv run python scripts/release_preflight.py "${{ inputs.version }}"

      - name: Run release benchmark gate
        run: uv run python scripts/release_benchmark_gate.py > benchmark-run.json

      - name: Assert benchmark thresholds
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("benchmark-run.json").read_text(encoding="utf-8"))
          assert data["thresholds_passed"] is True, data["failed_thresholds"]
          PY

      - name: Run test suite
        run: uv run pytest tests/ --ignore=tests/test_behavioral.py -q

      - name: Run Claude Code behavioral proof
        env:
          CLAUDE_TESTS: "1"
        run: uv run pytest tests/test_behavioral.py -q

      - name: Build package
        run: uv build

      - name: Validate distribution metadata
        run: uvx --from twine twine check dist/*

      - name: Verify wheel and sdist install smoke tests
        env:
          VERSION: ${{ inputs.version }}
        run: uv run python scripts/check_release_artifacts.py "${VERSION}"

      - name: Generate artifact attestations
        if: ${{ !github.event.repository.private }}
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Upload python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  build-binaries:
    name: Build binaries (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-latest
          - target: linux-x86_64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --extra openai --extra voyage

      - name: Build standalone binary
        run: uv run python scripts/build_release_binaries.py "${{ inputs.version }}" dist --target "${{ matrix.target }}"

      - name: Smoke-test standalone binary
        run: uv run python scripts/check_release_binaries.py "${{ inputs.version }}" dist --target "${{ matrix.target }}"

      - name: Upload standalone binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/mm-*

  release:
    needs: [verify, build-binaries]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Download python distributions
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: release-assets

      - name: Download standalone binaries
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          path: release-assets
          merge-multiple: true

      - name: Assemble installer and checksum manifest
        run: |
          cp scripts/install.sh release-assets/install.sh
          uv run python - <<'PY'
          from pathlib import Path

          from muscle_memory.release_artifacts import build_checksum_manifest_for_paths

          root = Path("release-assets")
          paths = sorted(
              path for path in root.iterdir() if path.is_file() and path.name != "SHA256SUMS"
          )
          build_checksum_manifest_for_paths(paths, root)
          PY

      - name: Extract release notes
        env:
          VERSION: ${{ inputs.version }}
        run: uv run python scripts/release_notes.py "${VERSION}" > release-notes.md

      - name: Create and push tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists; reusing it for rerun."
          else
            git tag -a "v${VERSION}" -m "v${VERSION}"
            git push origin "v${VERSION}"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body_path: release-notes.md
          files: release-assets/*

  publish-pypi:
    if: ${{ inputs.publish_to_pypi }}
    needs: [release]
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Download python distributions
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
