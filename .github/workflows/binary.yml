name: Build standalone binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: macos-arm64
          - os: macos-13
            target: macos-x86_64
          - os: ubuntu-latest
            target: linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv pip install pyinstaller
      - name: Build binary
        run: |
          uv run pyinstaller --onefile --name mm --strip \
            --collect-data muscle_memory \
            --hidden-import muscle_memory.hooks.user_prompt \
            --hidden-import muscle_memory.hooks.stop \
            --hidden-import muscle_memory.hooks.install \
            --hidden-import muscle_memory.bootstrap \
            --hidden-import muscle_memory.refine \
            --hidden-import muscle_memory.dedup \
            --hidden-import muscle_memory.extractor \
            --hidden-import muscle_memory.embeddings \
            --hidden-import muscle_memory.llm \
            --hidden-import muscle_memory.outcomes \
            --hidden-import muscle_memory.scorer \
            --hidden-import muscle_memory.retriever \
            src/muscle_memory/cli.py
      - name: Smoke test
        run: ./dist/mm version
      - name: Rename and compress
        run: |
          mv dist/mm dist/mm-${{ matrix.target }}
          tar -czf dist/mm-${{ matrix.target }}.tar.gz -C dist mm-${{ matrix.target }}
      - name: Upload to release
        run: gh release upload "${{ github.event.release.tag_name }}" dist/mm-${{ matrix.target }}.tar.gz --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
